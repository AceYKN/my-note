<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" width="128" height="128">
  <defs>
    <!-- Iridescent Gradient 1 (Blue/Cyan) -->
    <linearGradient id="grad1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#5b9bd5;stop-opacity:1" /> <!-- 藍 -->
      <stop offset="100%" style="stop-color:#9ed9f5;stop-opacity:0.8" />
    </linearGradient>
    
    <!-- Iridescent Gradient 2 (Pink/Violet) -->
    <linearGradient id="grad2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f2a7bb;stop-opacity:1" /> <!-- 桜 -->
      <stop offset="100%" style="stop-color:#c97b9b;stop-opacity:0.8" />
    </linearGradient>
    
    <!-- Iridescent Gradient 3 (Wisteria/Purple) -->
    <linearGradient id="grad3" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#9b8ec4;stop-opacity:1" /> <!-- 藤 -->
      <stop offset="100%" style="stop-color:#6c5ce7;stop-opacity:0.8" />
    </linearGradient>

    <!-- Glass Glow Filter -->
    <filter id="glass-glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="3.5" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>

    <!-- Surface Highlight -->
    <linearGradient id="highlight" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:white;stop-opacity:0.7" />
      <stop offset="50%" style="stop-color:white;stop-opacity:0" />
    </linearGradient>
  </defs>

  <!-- Abstract Stack Concept (3 Overlapping Glass Plates) -->
  
  <!-- Back Plate -->
  <rect x="36" y="36" width="56" height="56" rx="14" fill="url(#grad3)" transform="rotate(-15 64 64)" opacity="0.7" />
  
  <!-- Middle Plate -->
  <rect x="32" y="32" width="64" height="64" rx="16" fill="url(#grad2)" transform="rotate(10 64 64)" opacity="0.8" style="filter: url(#glass-glow)" />
  
  <!-- Front Top Plate -->
  <rect x="28" y="28" width="72" height="72" rx="18" fill="url(#grad1)" opacity="0.9" style="filter: url(#glass-glow)" />
  
  <!-- Top Surface Highlight (Refraction) -->
  <rect x="28" y="28" width="72" height="36" rx="18" fill="url(#highlight)" pointer-events="none" />
  
  <!-- Shine Border -->
  <rect x="28" y="28" width="72" height="72" rx="18" fill="none" stroke="rgba(255,255,255,0.5)" stroke-width="1.5" />
</svg>
