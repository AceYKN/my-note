<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Note Admin</title>
  <script src="https://cdn.jsdelivr.net/npm/marked@12/marked.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Microsoft YaHei', sans-serif;
      background: #1e1e1e;
      color: #d4d4d4;
      height: 100vh;
      display: grid;
      grid-template-rows: auto 1fr auto;
      overflow: hidden;
    }

    /* ── Toolbar ─── */
    #toolbar {
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 8px 12px;
      background: #323233;
      border-bottom: 1px solid #474747;
      flex-shrink: 0;
      min-height: 44px;
    }
    #toolbar-title {
      font-size: 14px;
      font-weight: 600;
      color: #fff;
      padding-right: 10px;
      border-right: 1px solid #474747;
      margin-right: 2px;
      white-space: nowrap;
    }
    .btn {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      padding: 5px 10px;
      border-radius: 4px;
      border: none;
      cursor: pointer;
      font-size: 12px;
      font-family: inherit;
      transition: background 0.15s, opacity 0.15s;
      white-space: nowrap;
    }
    .btn:disabled { opacity: 0.35; cursor: default; }
    .btn-ghost  { background: transparent; color: #bbb; }
    .btn-ghost:not(:disabled):hover  { background: #3e3e3e; color: #fff; }
    .btn-blue   { background: #0e639c; color: #fff; }
    .btn-blue:not(:disabled):hover   { background: #1177bb; }
    .btn-green  { background: #267f26; color: #fff; }
    .btn-green:not(:disabled):hover  { background: #2d9e2d; }
    .toolbar-spacer { flex: 1; }
    #current-path-display {
      font-size: 11px;
      color: #888;
      max-width: 360px;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    /* ── Main ─── */
    #main {
      display: grid;
      grid-template-columns: 220px 1fr;
      overflow: hidden;
    }

    /* ── Sidebar ─── */
    #sidebar {
      background: #252526;
      border-right: 1px solid #3e3e3e;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }
    #sidebar-header {
      padding: 8px 12px;
      font-size: 11px;
      font-weight: 700;
      color: #bbb;
      text-transform: uppercase;
      letter-spacing: 0.8px;
      border-bottom: 1px solid #3e3e3e;
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-shrink: 0;
    }
    #tree { flex: 1; overflow-y: auto; padding: 4px 0; }

    .tree-row {
      display: flex;
      align-items: center;
      cursor: pointer;
      user-select: none;
      min-height: 22px;
      padding: 1px 0;
    }
    .tree-row:hover { background: #2a2d2e; }
    .tree-row.active { background: #094771 !important; }
    .tree-indent { display: inline-block; flex-shrink: 0; }
    .tree-toggle { width: 16px; text-align: center; font-size: 9px; color: #777; flex-shrink: 0; }
    .tree-icon   { margin: 0 3px; flex-shrink: 0; font-size: 13px; }
    .tree-label  { font-size: 13px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .dir-label   { color: #e2c08d; }
    .md-label    { color: #9cdcfe; }
    .file-label  { color: #d4d4d4; }
    .tree-children       { display: none; }
    .tree-children.open  { display: block; }

    /* ── Editor area ─── */
    #editor-area {
      display: flex;
      flex-direction: column;
      overflow: hidden;
      background: #1e1e1e;
    }
    #placeholder {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      color: #555;
      gap: 10px;
    }
    #placeholder .big  { font-size: 40px; }
    #placeholder .hint { font-size: 13px; }

    #editor-tabs {
      display: flex;
      background: #252526;
      border-bottom: 1px solid #3e3e3e;
      flex-shrink: 0;
    }
    .editor-tab {
      padding: 7px 18px;
      font-size: 13px;
      cursor: pointer;
      color: #888;
      border-bottom: 2px solid transparent;
      transition: all 0.15s;
      user-select: none;
    }
    .editor-tab:hover { color: #ccc; }
    .editor-tab.active { color: #fff; border-bottom-color: #0e639c; }

    #editor-panel, #preview-panel { flex: 1; overflow: hidden; display: none; }
    #editor-panel.active   { display: flex; }
    #preview-panel.active  { display: block; overflow-y: auto; }

    #editor {
      flex: 1;
      background: #1e1e1e;
      color: #d4d4d4;
      border: none;
      outline: none;
      padding: 20px 24px;
      font-family: 'Cascadia Code', 'Fira Code', 'JetBrains Mono', Consolas, 'Courier New', monospace;
      font-size: 14px;
      line-height: 1.7;
      resize: none;
      tab-size: 2;
    }

    #preview-panel { padding: 28px 40px; }
    #preview-content { max-width: 820px; margin: 0 auto; line-height: 1.8; color: #ccc; }
    #preview-content h1 { font-size: 2em; color: #fff; margin: 0.8em 0 0.4em; border-bottom: 1px solid #3e3e3e; padding-bottom: 0.3em; }
    #preview-content h2 { font-size: 1.5em; color: #fff; margin: 1.4em 0 0.5em; border-bottom: 1px solid #3e3e3e; padding-bottom: 0.2em; }
    #preview-content h3 { font-size: 1.2em; color: #e2e2e2; margin: 1.2em 0 0.4em; }
    #preview-content p  { margin: 0.7em 0; }
    #preview-content code { background: #2d2d2d; color: #ce9178; padding: 2px 6px; border-radius: 3px; font-size: 0.9em; font-family: monospace; }
    #preview-content pre { background: #2d2d2d; padding: 16px; border-radius: 6px; overflow-x: auto; margin: 1em 0; }
    #preview-content pre code { background: none; color: #d4d4d4; padding: 0; }
    #preview-content blockquote { border-left: 3px solid #0e639c; padding: 4px 0 4px 16px; margin: 1em 0; color: #999; background: #252526; border-radius: 0 4px 4px 0; }
    #preview-content ul, #preview-content ol { padding-left: 1.8em; margin: 0.5em 0; }
    #preview-content li { margin: 0.3em 0; }
    #preview-content a { color: #4fc1ff; text-decoration: none; }
    #preview-content a:hover { text-decoration: underline; }
    #preview-content strong { color: #fff; }
    #preview-content em { color: #ce9178; }
    #preview-content hr { border: none; border-top: 1px solid #3e3e3e; margin: 1.5em 0; }
    #preview-content table { border-collapse: collapse; width: 100%; margin: 1em 0; font-size: 0.95em; }
    #preview-content th, #preview-content td { border: 1px solid #3e3e3e; padding: 8px 12px; text-align: left; }
    #preview-content th { background: #2d2d2d; color: #fff; }
    #preview-content tr:nth-child(even) { background: #252526; }

    /* ── Status bar ─── */
    #statusbar {
      background: #007acc;
      color: #fff;
      padding: 3px 12px;
      font-size: 12px;
      display: flex;
      align-items: center;
      gap: 16px;
      flex-shrink: 0;
    }

    /* ── Toasts ─── */
    #toasts {
      position: fixed;
      bottom: 36px;
      right: 20px;
      display: flex;
      flex-direction: column;
      gap: 8px;
      z-index: 999;
      pointer-events: none;
    }
    .toast {
      padding: 10px 16px;
      border-radius: 6px;
      font-size: 13px;
      max-width: 380px;
      animation: toastIn 0.2s ease;
      box-shadow: 0 4px 16px rgba(0,0,0,0.5);
      white-space: pre-wrap;
      word-break: break-word;
    }
    .toast-success { background: #1a3a1a; border: 1px solid #267f26; color: #73c973; }
    .toast-error   { background: #3a1a1a; border: 1px solid #8b2020; color: #f08080; }
    .toast-info    { background: #1a2e3a; border: 1px solid #0e639c; color: #6cb8f0; }
    @keyframes toastIn { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: none; } }

    /* ── Modal ─── */
    #modal-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.65);
      align-items: center;
      justify-content: center;
      z-index: 200;
    }
    #modal-overlay.open { display: flex; }
    #modal-box {
      background: #2d2d2d;
      border: 1px solid #474747;
      border-radius: 8px;
      padding: 24px;
      min-width: 380px;
      max-width: 520px;
      width: 90%;
      box-shadow: 0 8px 32px rgba(0,0,0,0.6);
    }
    #modal-box h3 { color: #fff; font-size: 15px; margin-bottom: 16px; }
    .form-group { margin-bottom: 14px; }
    .form-group label { display: block; font-size: 12px; color: #aaa; margin-bottom: 5px; }
    .form-group input, .form-group textarea {
      width: 100%;
      padding: 8px 10px;
      background: #1e1e1e;
      color: #d4d4d4;
      border: 1px solid #474747;
      border-radius: 4px;
      font-size: 13px;
      font-family: inherit;
      outline: none;
    }
    .form-group input:focus, .form-group textarea:focus { border-color: #0e639c; }
    .modal-footer { display: flex; gap: 8px; justify-content: flex-end; margin-top: 16px; }

    ::-webkit-scrollbar { width: 6px; height: 6px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: #555; border-radius: 3px; }
    ::-webkit-scrollbar-thumb:hover { background: #777; }
  </style>
</head>
<body>

<!-- ── Toolbar ─────────────────────────────────────── -->
<div id="toolbar">
  <span id="toolbar-title">📝 Note Admin</span>
  <button class="btn btn-ghost"  onclick="showNewFileModal()">＋ 新建</button>
  <button class="btn btn-blue"   id="btn-save"  onclick="saveFile()" disabled>💾 保存</button>
  <button class="btn btn-ghost"  id="btn-clean" onclick="cleanCites()" disabled>🧹 清除 Cite</button>
  <button class="btn btn-ghost"  id="btn-sync"  onclick="syncIndex()" disabled>🔄 同步 Index</button>
  <button class="btn btn-green"  onclick="showPushModal()">🚀 Push</button>
  <div class="toolbar-spacer"></div>
  <span id="current-path-display">未选择文件</span>
</div>

<!-- ── Layout ─────────────────────────────────────── -->
<div id="main">

  <div id="sidebar">
    <div id="sidebar-header">
      <span>文件</span>
      <button class="btn btn-ghost" style="padding:2px 6px;font-size:11px" onclick="loadTree()">↺ 刷新</button>
    </div>
    <div id="tree"><div style="padding:12px;color:#666;font-size:12px">加载中…</div></div>
  </div>

  <div id="editor-area">
    <div id="placeholder">
      <span class="big">📂</span>
      <span class="hint">从左侧选择文件开始编辑</span>
    </div>

    <div id="editor-tabs" style="display:none">
      <div class="editor-tab active" onclick="switchTab('editor')">编辑</div>
      <div class="editor-tab"       onclick="switchTab('preview')">预览</div>
    </div>
    <div id="editor-panel">
      <textarea id="editor" spellcheck="false" placeholder="在这里编辑 Markdown 内容…"></textarea>
    </div>
    <div id="preview-panel">
      <div id="preview-content"></div>
    </div>
  </div>
</div>

<!-- ── Status Bar ─────────────────────────────────── -->
<div id="statusbar">
  <span id="statusbar-file">就绪</span>
  <span id="statusbar-msg"></span>
</div>

<div id="toasts"></div>

<!-- ── Modal ──────────────────────────────────────── -->
<div id="modal-overlay" onclick="onOverlayClick(event)">
  <div id="modal-box">
    <h3 id="modal-title">操作</h3>
    <div id="modal-body"></div>
    <div class="modal-footer">
      <button class="btn btn-ghost" onclick="closeModal()">取消</button>
      <button class="btn btn-blue"  id="modal-ok" onclick="onModalOk()">确认</button>
    </div>
  </div>
</div>

<script>
'use strict'

let currentFilePath = null
let dirty = false
let modalAction = null

// ── API ──────────────────────────────────────────────
async function api(method, path, body) {
  const opts = { method, headers: {} }
  if (body !== undefined) {
    opts.headers['Content-Type'] = 'application/json'
    opts.body = JSON.stringify(body)
  }
  const res = await fetch(path, opts)
  const data = await res.json()
  if (data.error) throw new Error(data.error)
  return data
}

// ── Tree ─────────────────────────────────────────────
async function loadTree() {
  document.getElementById('tree').innerHTML = '<div style="padding:12px;color:#666;font-size:12px">加载中…</div>'
  try {
    const tree = await api('GET', '/api/tree')
    document.getElementById('tree').innerHTML = buildTreeHtml(tree, 0)
  } catch (e) {
    document.getElementById('tree').innerHTML = `<div style="padding:12px;color:#f08080;font-size:12px">加载失败: ${escHtml(e.message)}</div>`
  }
}

function buildTreeHtml(nodes, depth) {
  return nodes.map(node => {
    const pl = depth * 12 + 8
    if (node.type === 'dir') {
      const children = buildTreeHtml(node.children || [], depth + 1)
      return `<div>
        <div class="tree-row" onclick="toggleFolder(this)" data-path="${escHtml(node.path)}">
          <span class="tree-indent" style="width:${pl}px"></span>
          <span class="tree-toggle">▶</span>
          <span class="tree-icon">📁</span>
          <span class="tree-label dir-label">${escHtml(node.name)}</span>
        </div>
        <div class="tree-children">${children}</div>
      </div>`
    } else {
      const isMd = node.ext === '.md'
      return `<div class="tree-row" onclick="openFile('${escHtml(node.path)}')" data-path="${escHtml(node.path)}">
        <span class="tree-indent" style="width:${pl + 16}px"></span>
        <span class="tree-icon" style="font-size:12px">${isMd ? '📄' : '📃'}</span>
        <span class="tree-label ${isMd ? 'md-label' : 'file-label'}">${escHtml(node.name)}</span>
      </div>`
    }
  }).join('')
}

function toggleFolder(el) {
  const ch = el.nextElementSibling
  const open = ch.classList.toggle('open')
  el.querySelector('.tree-toggle').textContent = open ? '▼' : '▶'
  el.querySelector('.tree-icon').textContent   = open ? '📂' : '📁'
}

// ── File ops ─────────────────────────────────────────
async function openFile(path) {
  if (dirty && !confirm('有未保存的更改，确定要离开吗？')) return
  try {
    const { content } = await api('GET', `/api/file?path=${encodeURIComponent(path)}`)
    currentFilePath = path
    dirty = false

    const editor = document.getElementById('editor')
    editor.value = content

    // Show editor UI
    document.getElementById('placeholder').style.display = 'none'
    document.getElementById('editor-tabs').style.display = 'flex'
    document.getElementById('editor-panel').classList.add('active')
    document.getElementById('preview-panel').classList.remove('active')
    document.querySelectorAll('.editor-tab').forEach((t, i) => t.classList.toggle('active', i === 0))

    // Enable buttons
    ;['btn-save', 'btn-clean', 'btn-sync'].forEach(id => {
      document.getElementById(id).disabled = false
    })

    // Path displays
    document.getElementById('current-path-display').textContent = path
    document.getElementById('statusbar-file').textContent = path
    setStatus('')

    // Highlight active file in tree
    document.querySelectorAll('.tree-row.active').forEach(e => e.classList.remove('active'))
    document.querySelector(`.tree-row[data-path="${CSS.escape(path)}"]`)?.classList.add('active')

    // Dirty tracking
    const markDirty = () => { dirty = true; setStatus('● 未保存') }
    editor.removeEventListener('input', markDirty)
    editor.addEventListener('input', markDirty)
    editor.focus()
  } catch (e) {
    toast('打开失败: ' + e.message, 'error')
  }
}

async function saveFile() {
  if (!currentFilePath) { toast('请先选择一个文件', 'info'); return }
  const content = document.getElementById('editor').value
  try {
    await api('POST', '/api/save', { path: currentFilePath, content })
    dirty = false
    setStatus('已保存')
    toast('✓ 已保存 ' + currentFilePath, 'success')
  } catch (e) {
    toast('保存失败: ' + e.message, 'error')
  }
}

// ── Actions ──────────────────────────────────────────
async function cleanCites() {
  if (!currentFilePath) { toast('请先选择文件', 'info'); return }
  if (!currentFilePath.endsWith('.md')) { toast('仅支持 .md 文件', 'info'); return }
  if (dirty) await saveFile()
  try {
    const { output } = await api('POST', '/api/action', { action: 'clean', args: [currentFilePath] })
    toast(output.trim() || '✓ 完成', 'success')
    // Reload content
    const { content } = await api('GET', `/api/file?path=${encodeURIComponent(currentFilePath)}`)
    document.getElementById('editor').value = content
    dirty = false
    setStatus('已清除 Cite 标签')
  } catch (e) {
    toast('失败: ' + e.message, 'error')
  }
}

async function syncIndex() {
  if (!currentFilePath) { toast('请先选择文件', 'info'); return }
  const parts = currentFilePath.split('/')
  parts.pop()
  const dir = parts.join('/')
  try {
    const { output } = await api('POST', '/api/action', { action: 'sync', args: [dir] })
    toast(output.trim() || '✓ 同步完成', 'success')
    setStatus('Index 已同步')
    loadTree()
  } catch (e) {
    toast('同步失败: ' + e.message, 'error')
  }
}

// ── Modals ────────────────────────────────────────────
function showNewFileModal() {
  modalAction = 'newfile'
  const defaultPath = currentFilePath ? currentFilePath.replace(/[^/]+$/, '') : 'docs/'
  document.getElementById('modal-title').textContent = '+ 新建文件'
  document.getElementById('modal-body').innerHTML = `
    <div class="form-group">
      <label>文件路径（相对于项目根目录）</label>
      <input id="modal-input" type="text" value="${escHtml(defaultPath)}" placeholder="docs/cs/se/notesbychap/chap10.md">
    </div>
    <div class="form-group">
      <label>初始内容（可选）</label>
      <textarea id="modal-content" rows="4" placeholder="# Chapter X: Title"></textarea>
    </div>`
  document.getElementById('modal-ok').textContent = '创建'
  openModal()
  document.getElementById('modal-input').focus()
}

function showPushModal() {
  modalAction = 'push'
  document.getElementById('modal-title').textContent = '🚀 Push 到远程'
  document.getElementById('modal-body').innerHTML = `
    <div class="form-group">
      <label>Commit message</label>
      <input id="modal-input" type="text" value="docs: update notes" placeholder="docs: update notes">
    </div>`
  document.getElementById('modal-ok').textContent = 'Push'
  openModal()
  setTimeout(() => { const i = document.getElementById('modal-input'); i.focus(); i.select() }, 50)
}

function openModal()  { document.getElementById('modal-overlay').classList.add('open') }
function closeModal() { document.getElementById('modal-overlay').classList.remove('open') }
function onOverlayClick(e) { if (e.target === document.getElementById('modal-overlay')) closeModal() }

async function onModalOk() {
  const input = (document.getElementById('modal-input')?.value || '').trim()
  closeModal()

  if (modalAction === 'push') {
    setStatus('推送中…')
    try {
      const { output } = await api('POST', '/api/action', { action: 'push', args: [input || 'docs: update notes'] })
      toast('✓ 推送成功\n' + output.trim(), 'success')
      setStatus('已推送')
    } catch (e) {
      toast('推送失败: ' + e.message, 'error')
      setStatus('推送失败')
    }

  } else if (modalAction === 'newfile') {
    if (!input) return
    const path = input.endsWith('.md') ? input : input + '.md'
    const initContent = document.getElementById('modal-content')?.value || ''
    try {
      await api('POST', '/api/save', { path, content: initContent })
      toast('✓ 已创建 ' + path, 'success')
      await loadTree()
      await openFile(path)
    } catch (e) {
      toast('创建失败: ' + e.message, 'error')
    }
  }
}

// ── Tabs ─────────────────────────────────────────────
function switchTab(tab) {
  const tabs   = document.querySelectorAll('.editor-tab')
  const editor = document.getElementById('editor-panel')
  const preview = document.getElementById('preview-panel')
  tabs.forEach((t, i) => t.classList.toggle('active', (tab === 'editor') === (i === 0)))
  if (tab === 'editor') {
    editor.classList.add('active')
    preview.classList.remove('active')
    document.getElementById('editor').focus()
  } else {
    editor.classList.remove('active')
    preview.classList.add('active')
    document.getElementById('preview-content').innerHTML = marked.parse(document.getElementById('editor').value)
  }
}

// ── Utils ─────────────────────────────────────────────
function toast(msg, type = 'info') {
  const el = document.createElement('div')
  el.className = `toast toast-${type}`
  el.textContent = msg
  document.getElementById('toasts').appendChild(el)
  setTimeout(() => el.remove(), type === 'error' ? 6000 : 3500)
}

function setStatus(msg) {
  document.getElementById('statusbar-msg').textContent = msg
}

function escHtml(s) {
  return String(s)
    .replace(/&/g, '&amp;')
    .replace(/"/g, '&quot;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;')
}

// Keyboard shortcuts
document.addEventListener('keydown', e => {
  if ((e.ctrlKey || e.metaKey) && e.key === 's') { e.preventDefault(); saveFile() }
  if (e.key === 'Escape') closeModal()
})

loadTree()
</script>
</body>
</html>
