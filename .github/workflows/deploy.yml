# 构建并部署 VitePress 站点到 GitHub Pages
name: Deploy VitePress site to Pages

on:
  # 当推送到 main 或 master 分支时触发
  push:
    branches: [main, master]

  # 在 PR 中执行审计和构建，但不部署
  pull_request:
    branches: [main, master]

  # 允许你手动触发
  workflow_dispatch:

# 解决 Actions 中的 Node.js 20 弃用警告
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

# 默认只授予读取仓库内容的权限
permissions:
  contents: read

# 同一 PR 只保留最新检查；不同 PR 与主分支部署互不阻塞
concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  # 安全审计
  audit:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Security audit
        run: npm audit --audit-level=high

  # 构建工作
  build:
    runs-on: ubuntu-latest
    needs: audit
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Check source and build
        run: npm run check

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          # 关键点：告诉 GitHub 构建好的网页在哪里
          # 因为你的源文件在 docs，VitePress 默认会输出到 docs/.vitepress/dist
          path: docs/.vitepress/dist

  # 部署工作
  deploy:
    # PR 只验证审计与构建，实际部署仅由 push 或手动运行触发
    if: github.event_name != 'pull_request'
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    needs: build
    runs-on: ubuntu-latest
    name: Deploy
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
